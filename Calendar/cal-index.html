<!DOCTYPE html>
<html lang="en">
<head>
    <link rel=""stylesheet" href="cal-style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,
        FILL,GRAD@20..48,100..700,0..1,-50..200">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="calendar-container">
        <header class="cal-header">
            <p class="cal-current-date"></p>
            <div class="cal-nav">
                <span id="cal-prev" class="material-symbols-rounded">
                        chevron_left
                </span>
            </div>
        </header>

        <div class="cal-body">
            <ul class="cal-weekdays">
                <li>Sun</li>
                <li>Mon</li>
                <li>Tue</li>
                <li>Wed</li>
                <li>Thu</li>
                <li>Fri</li>
                <li>Sat</li>
            </ul>
            <ul class="cal-dates"></ul>
        </div>
    </div>
    <script src="cal-script.js"></script>
</body>
</html>
